<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 & ReactDOM 18 CDN (안정적인 실시간 렌더링) -->

  <!-- Firebase v10 Compat SDK (안정적인 전역 네임스페이스 로드) -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #E5E9F0;
    }

    /* --- 현실적인 3D 가공 플라스틱 입체 셰이딩 (Embossed Plate) --- */
    .tactile-card {
      background: linear-gradient(145deg, #EEF2F6, #D8DFE8);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      box-shadow: 
        6px 8px 18px rgba(163, 177, 198, 0.55), 
        -6px -6px 18px rgba(255, 255, 255, 0.95),
        inset 1px 1px 2px rgba(255, 255, 255, 0.9);
      border-radius: 32px;
    }

    /* 현실적인 이중 프레임 홈버튼 디자인 알약형 물리 단추 */
    .tactile-pill-btn {
      background: linear-gradient(180deg, #F1F5F9 0%, #D8DFE8 100%);
      border: 3.5px solid #CBD5E1; /* 사출 주물 링 테두리 */
      outline: 1.5px solid #F1F5F9; /* 상단 하이라이트 광원 반사 */
      box-shadow: 
        inset 0px 2.5px 5px rgba(0, 0, 0, 0.12),
        inset 0px -2.5px 5px rgba(255, 255, 255, 0.95),
        0px 6px 14px rgba(148, 163, 184, 0.5); /* 잘림을 방지하기 위해 넉넉한 그림자 반경 확보 */
      border-radius: 9999px;
      transition: all 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
      color: #475569;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 10px 20px;
    }

    .tactile-pill-btn:hover {
      background: linear-gradient(180deg, #F8FAFC 0%, #D1D5DB 100%);
      box-shadow: 
        inset 0px 1.5px 3px rgba(0, 0, 0, 0.08),
        inset 0px -2.5px 5px rgba(255, 255, 255, 0.98),
        0px 8px 18px rgba(148, 163, 184, 0.65);
      transform: translateY(-1px);
    }

    .tactile-pill-btn:active, .tactile-pill-btn-active {
      background: linear-gradient(180deg, #CBD5E1 0%, #94A3B8 100%);
      border-color: #94A3B8;
      outline-color: #CBD5E1;
      box-shadow: 
        inset 0px 5px 10px rgba(0, 0, 0, 0.28),
        inset 0px -1px 2px rgba(255, 255, 255, 0.4),
        0px 2px 4px rgba(255, 255, 255, 0.5);
      transform: translateY(1.5px);
      color: #1E293B;
    }

    /* 메이저 전송 및 생성동작을 위한 블루 광원 알약 물리 단추 */
    .tactile-pill-btn-primary {
      background: linear-gradient(180deg, #93C5FD 0%, #2563EB 100%);
      border: 3.5px solid #1D4ED8;
      outline: 1.5px solid #93C5FD;
      box-shadow: 
        inset 0px 2.5px 5px rgba(0, 0, 0, 0.16),
        inset 0px -2.5px 5px rgba(255, 255, 255, 0.45),
        0px 6px 14px rgba(37, 99, 235, 0.35);
      border-radius: 9999px;
      transition: all 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
      color: white;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 10px 20px;
    }

    .tactile-pill-btn-primary:hover:not(:disabled) {
      background: linear-gradient(180deg, #A1CFFF 0%, #1D4ED8 100%);
      box-shadow: 
        inset 0px 1.5px 3px rgba(0, 0, 0, 0.1),
        inset 0px -2.5px 5px rgba(255, 255, 255, 0.5),
        0px 8px 18px rgba(37, 99, 235, 0.45);
      transform: translateY(-1px);
    }

    .tactile-pill-btn-primary:active:not(:disabled) {
      background: linear-gradient(180deg, #2563EB 0%, #1E3A8A 100%);
      border-color: #1E3A8A;
      outline-color: #2563EB;
      box-shadow: 
        inset 0px 5px 10px rgba(0, 0, 0, 0.35),
        inset 0px -1px 2px rgba(255, 255, 255, 0.25),
        0px 2px 4px rgba(255, 255, 255, 0.2);
      transform: translateY(1.5px);
    }

    .tactile-pill-btn-primary:disabled {
      background: linear-gradient(180deg, #E2E8F0 0%, #CBD5E1 100%);
      border-color: #CBD5E1;
      outline-color: #E2E8F0;
      box-shadow: none;
      color: #94A3B8;
      cursor: not-allowed;
      transform: none !important;
    }

    /* 외형 바닥면 플레이트 (Plate Depth Base) */
    .tactile-plate {
      background: linear-gradient(145deg, #EEF2F6, #D8DFE8);
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      box-shadow: 
        8px 10px 24px rgba(163, 177, 198, 0.55), 
        -8px -8px 24px rgba(255, 255, 255, 0.95),
        inset 1px 1px 2px rgba(255, 255, 255, 0.9);
      border-radius: 32px;
    }

    /* 음각으로 깎여 파인 대화 슬롯 웰 (Debossed Basin) */
    .debossed-well {
      background: #E2E8F0;
      border-radius: 24px;
      box-shadow: 
        inset 3.5px 3.5px 8px rgba(163, 177, 198, 0.8), 
        inset -3.5px -3.5px 8px rgba(255, 255, 255, 0.95),
        1px 1.5px 2px rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    /* 볼록 솟은 메시지 유닛 벌룬 (Embossed Message Units) */
    .embossed-unit-gray {
      background: linear-gradient(145deg, #EEF2F6, #D8DFE8);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      box-shadow: 
        3px 4px 10px rgba(163, 177, 198, 0.5), 
        -3px -3px 10px rgba(255, 255, 255, 0.85);
      border-radius: 24px;
    }

    .embossed-unit-blue {
      background: linear-gradient(145deg, #93C5FD, #2563EB);
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      box-shadow: 
        3px 4px 10px rgba(37, 99, 235, 0.28), 
        -2px -2px 8px rgba(255, 255, 255, 0.2);
      border-radius: 24px;
    }

    /* 쫀득하고 미세한 바운스 모션 효과 피드백 감쇄 수치 조정 */
    .chewy-bounce-mild {
      transition: transform 0.12s cubic-bezier(0.2, 0.8, 0.2, 1.1), box-shadow 0.12s ease;
    }
    .chewy-bounce-mild:active {
      transform: scale(0.97);
    }

    /* 정돈된 스크롤바 디자인 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94A3B8;
    }
  </style>
</head>

  <!-- 메인 리액트 앱 스크립트 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- [사용자 전용] 사용자가 제공한 파이어베이스 정보 탑재 완료 ---
    const defaultFirebaseConfig = {
      apiKey: "AIzaSyAc19oH9g6K3wAKdDA1_WwhKpmilJqwrAk",
      authDomain: "bbababam.firebaseapp.com",
      projectId: "bbababam",
      storageBucket: "bbababam.firebasestorage.app",
      messagingSenderId: "171470364166",
      appId: "1:171470364166:web:98455a89d49c19d0fe6d87",
      measurementId: "G-0W3V7GWVXY"
    };

    const getFirebaseConfig = () => {
      try {
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
          return JSON.parse(__firebase_config);
        }
      } catch (e) {}
      return defaultFirebaseConfig; 
    };

    const firebaseConfig = getFirebaseConfig();
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    const AVATAR_COLORS = [
      'bg-[#E2E8F0] text-[#334155] border-[#CBD5E1]',
      'bg-[#F1F5F9] text-[#475569] border-[#E2E8F0]',
      'bg-[#FFE4E6] text-[#E11D48] border-[#FECDD3]',
      'bg-[#FEF3C7] text-[#D97706] border-[#FDE68A]',
      'bg-[#ECFDF5] text-[#059669] border-[#D1FAE5]',
      'bg-[#E0F2FE] text-[#0284C7] border-[#BAE6FD]',
      'bg-[#EEF2F6] text-[#334155] border-[#D8E2EF]',
      'bg-[#FAE8FF] text-[#C084FC] border-[#F3E8FF]',
      'bg-[#F0FDF4] text-[#16A34A] border-[#DCFCE7]',
      'bg-[#FFF1F2] text-[#F43F5E] border-[#FFE4E6]',
    ];

    const EMOJIS = ['👍', '❤️', '😂', '🔥', '👀', '🎉'];

    function App() {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [messages, setMessages] = useState([]);
      const [allProfiles, setAllProfiles] = useState([]);
      const [isCloudConnected, setIsCloudConnected] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      
      const [inputText, setInputText] = useState('');
      const [replyingTo, setReplyingTo] = useState(null);
      const [readInfoModal, setReadInfoModal] = useState(null);
      const [reactionMenu, setReactionMenu] = useState(null);
      
      const [isJoined, setIsJoined] = useState(false);
      const [joinName, setJoinName] = useState('');
      const [loginMode, setLoginMode] = useState('select');
      
      // 채널 ID 상태
      const [channelId, setChannelId] = useState(() => {
        return localStorage.getItem(`transparent_channel_${appId}`) || '101'; 
      });
      const [tempChannelId, setTempChannelId] = useState(channelId);

      // 계정 삭제 모달 상태
      const [showDeleteModal, setShowDeleteModal] = useState(false);

      // 알림 권한 상태 추적
      const [notiPermission, setNotiPermission] = useState('default');

      const messagesEndRef = useRef(null);
      const prevMsgCountRef = useRef(0);

      // --- 알림 권한 초기 확인 ---
      useEffect(() => {
        if ('Notification' in window) {
          setNotiPermission(Notification.permission);
        }
      }, []);

      // --- 알림 권한 요청 수동 처리 ---
      const handleRequestNotification = () => {
        if ('Notification' in window) {
          if (Notification.permission === 'denied') {
            alert('브라우저에서 알림이 "차단"되어 있습니다.\n브라우저 주소창 왼쪽 자물쇠 아이콘을 눌러 알림 권한을 "허용"으로 바꿔주세요.');
            return;
          }
          Notification.requestPermission().then(permission => {
            setNotiPermission(permission);
          });
        } else {
          alert('이 브라우저는 알림 기능을 지원하지 않습니다.');
        }
      };

      // --- 새 메시지 도착 알림 발송 ---
      useEffect(() => {
        if (messages.length > prevMsgCountRef.current) {
          if (prevMsgCountRef.current > 0 && profile) {
            const latestMsg = messages[messages.length - 1];
            // 내가 보낸 메시지가 아닐 경우에만 알림
            if (latestMsg && latestMsg.senderId !== profile.id) {
              if ('Notification' in window && Notification.permission === 'granted') {
                // 브라우저 탭을 안 보고 있을 때(숨겨져 있을 때)만 스마트하게 알림!
                if (document.hidden) {
                  new Notification('빠바밤 새 메시지', {
                    body: `${latestMsg.senderName}: ${latestMsg.text || '사진/메시지가 도착했습니다.'}`
                  });
                }
              }
            }
          }
        }
        prevMsgCountRef.current = messages.length;
      }, [messages, profile]);

      // --- 헬퍼 함수 정의 ---
      const formatTime = (timestamp) => {
        return new Date(timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      };

      // --- LOCAL STORAGE 가상 세션 제어 폴백 ---
      const getLocalProfiles = () => {
        try {
          return JSON.parse(localStorage.getItem(`local_profiles_${appId}_ch_${channelId}`) || '[]');
        } catch (e) { return []; }
      };

      const getLocalMessages = () => {
        try {
          return JSON.parse(localStorage.getItem(`local_messages_${appId}_ch_${channelId}`) || '[]');
        } catch (e) { return []; }
      };

      // 1. Firebase Auth 및 기존 기기 세션 검증
      useEffect(() => {
        setIsLoading(true);
        
        // 3초 뒤 자동 타임아웃 해제
        const timeoutId = setTimeout(() => {
          if (isLoading) {
            console.warn("Firebase Auth timed out or failed. Starting safely in Local Fallback mode.");
            setIsCloudConnected(false);
            setAllProfiles(getLocalProfiles());
            checkLocalSession();
            setIsLoading(false);
          }
        }, 3000);

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
            setIsCloudConnected(true);
          } catch (error) {
            console.error("Firebase Auth Failed. Please enable Anonymous Auth in Firebase Console.", error);
            setIsCloudConnected(false);
            setAllProfiles(getLocalProfiles());
            checkLocalSession();
            setIsLoading(false);
          }
        };

        initAuth();

        const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            const savedProfileId = localStorage.getItem(`transparent_chat_profile_${appId}_ch_${channelId}`);
            if (savedProfileId) {
              try {
                const pRef = db.doc(`artifacts/${appId}/channels/${channelId}/users/${savedProfileId}`);
                const pSnap = await pRef.get();
                if (pSnap.exists) {
                  setProfile({ id: savedProfileId, ...pSnap.data() });
                  setIsJoined(true);
                } else {
                  checkLocalSession();
                }
              } catch (e) {
                checkLocalSession();
              }
            } else {
              checkLocalSession();
            }
            clearTimeout(timeoutId);
            setIsLoading(false);
          }
        });

        return () => {
          clearTimeout(timeoutId);
          unsubscribe();
        };
      }, [channelId]);

      const checkLocalSession = () => {
        const savedProfileId = localStorage.getItem(`transparent_chat_profile_${appId}_ch_${channelId}`);
        if (savedProfileId) {
          const localUsers = getLocalProfiles();
          const found = localUsers.find(u => u.id === savedProfileId);
          if (found) {
            setProfile(found);
            setIsJoined(true);
            setMessages(getLocalMessages());
          } else {
            localStorage.removeItem(`transparent_chat_profile_${appId}_ch_${channelId}`);
          }
        }
      };

      // 2. 기기간 무제한 데이터 실시간 동기화 리스너 바인딩 
      useEffect(() => {
        if (!isCloudConnected || !db || !user) {
          const handleStorageChange = () => {
            setAllProfiles(getLocalProfiles());
            if (isJoined) {
              setMessages(getLocalMessages());
            }
          };
          window.addEventListener('storage', handleStorageChange);
          
          setAllProfiles(getLocalProfiles());
          if (isJoined) {
            setMessages(getLocalMessages());
          }
          return () => window.removeEventListener('storage', handleStorageChange);
        }

        const usersRef = db.collection(`artifacts/${appId}/channels/${channelId}/users`);
        const unsubscribeUsers = usersRef.onSnapshot((snapshot) => {
          const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAllProfiles(list);
          if (profile) {
            const currentRefreshed = list.find(u => u.id === profile.id);
            if (currentRefreshed) {
              setProfile(currentRefreshed);
            }
          }
        }, () => {
          setIsCloudConnected(false);
        });

        let unsubscribeMessages = () => {};
        if (isJoined && profile) {
          const messagesRef = db.collection(`artifacts/${appId}/channels/${channelId}/messages`);
          unsubscribeMessages = messagesRef.onSnapshot((snapshot) => {
            const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            setMessages(msgs);

            msgs.forEach(msg => {
              if (msg.senderId !== profile.id && (!msg.readBy || !msg.readBy.includes(profile.id))) {
                const currentMsgRef = db.doc(`artifacts/${appId}/channels/${channelId}/messages/${msg.id}`);
                currentMsgRef.update({
                  readBy: firebase.firestore.FieldValue.arrayUnion(profile.id)
                }).catch(() => {});
              }
            });
          }, console.error);
        }

        return () => {
          unsubscribeUsers();
          unsubscribeMessages();
        };
      }, [user, isJoined, profile?.id, isCloudConnected, channelId]);

      // 3. 실시간 투명 타이핑 스트림 기기간 싱크
      useEffect(() => {
        if (!isJoined || !profile) return;

        if (isCloudConnected && db) {
          const userRef = db.doc(`artifacts/${appId}/channels/${channelId}/users/${profile.id}`);
          const timeoutId = setTimeout(() => {
            userRef.update({ 
              typingText: inputText.trim()
            }).catch(() => {});
          }, 90);
          return () => clearTimeout(timeoutId);
        } else {
          const timeoutId = setTimeout(() => {
            const localUsers = getLocalProfiles();
            const updated = localUsers.map(u => u.id === profile.id ? { ...u, typingText: inputText.trim() } : u);
            localStorage.setItem(`local_profiles_${appId}_ch_${channelId}`, JSON.stringify(updated));
            window.dispatchEvent(new Event('storage'));
          }, 90);
          return () => clearTimeout(timeoutId);
        }
      }, [inputText, isJoined, profile?.id, isCloudConnected, channelId]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, allProfiles]);

      const handleChannelChange = (e) => {
        e.preventDefault();
        if (!tempChannelId.trim()) return;
        localStorage.setItem(`transparent_channel_${appId}`, tempChannelId.trim());
        setChannelId(tempChannelId.trim());
        setProfile(null);
        setIsJoined(false);
        setMessages([]);
        setAllProfiles([]);
      };

      const handleCreateProfile = async (e) => {
        e.preventDefault();
        if (!joinName.trim()) return; 

        // 가입할 때 최초로 한 번 권한을 묻습니다.
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission().then(setNotiPermission);
        }

        const customId = 'user_' + Date.now() + Math.random().toString(36).substr(2, 4);
        const randomColor = AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)];
        
        const newProfile = {
          id: customId,
          name: joinName.trim(),
          color: randomColor,
          typingText: ''
        };

        if (isCloudConnected && db) {
          try {
            const userRef = db.doc(`artifacts/${appId}/channels/${channelId}/users/${customId}`);
            await userRef.set({ name: newProfile.name, color: newProfile.color, typingText: '' });
          } catch (err) {
            console.error("Failed to register profile to Firebase, falling back to local storage.", err);
            setIsCloudConnected(false);
          }
        }

        const currentLocals = getLocalProfiles();
        const updatedLocals = [...currentLocals, newProfile];
        localStorage.setItem(`local_profiles_${appId}_ch_${channelId}`, JSON.stringify(updatedLocals));
        localStorage.setItem(`transparent_chat_profile_${appId}_ch_${channelId}`, customId);
        
        setProfile(newProfile);
        setIsJoined(true);
        setJoinName('');

        if (!isCloudConnected) {
          setAllProfiles(updatedLocals);
          setMessages(getLocalMessages());
        }
      };

      const handleSelectProfile = (selectedIdx) => {
        const selected = allProfiles[selectedIdx];
        localStorage.setItem(`transparent_chat_profile_${appId}_ch_${channelId}`, selected.id);
        
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission().then(setNotiPermission);
        }

        setProfile(selected);
        setIsJoined(true);
        if (!isCloudConnected) {
          setMessages(getLocalMessages());
        }
      };

      const handleSwitchAccount = async () => {
        if (profile) {
          if (isCloudConnected && db) {
            const userRef = db.doc(`artifacts/${appId}/channels/${channelId}/users/${profile.id}`);
            await userRef.update({ typingText: '' }).catch(() => {});
          } else {
            const localUsers = getLocalProfiles();
            const updated = localUsers.map(u => u.id === profile.id ? { ...u, typingText: '' } : u);
            localStorage.setItem(`local_profiles_${appId}_ch_${channelId}`, JSON.stringify(updated));
            window.dispatchEvent(new Event('storage'));
          }
        }
        localStorage.removeItem(`transparent_chat_profile_${appId}_ch_${channelId}`);
        setProfile(null);
        setIsJoined(false);
        setMessages([]);
        setLoginMode('select');
      };

      const handleDeleteAccount = async () => {
        if (!profile) return;
        
        if (isCloudConnected && db) {
          try {
            await db.doc(`artifacts/${appId}/channels/${channelId}/users/${profile.id}`).delete();
          } catch (err) {
            console.error("계정 삭제 실패 (Cloud):", err);
          }
        }
        
        const localUsers = getLocalProfiles().filter(u => u.id !== profile.id);
        localStorage.setItem(`local_profiles_${appId}_ch_${channelId}`, JSON.stringify(localUsers));
        localStorage.removeItem(`transparent_chat_profile_${appId}_ch_${channelId}`);
        
        setProfile(null);
        setIsJoined(false);
        setMessages([]);
        setLoginMode('select');
        setShowDeleteModal(false);
        window.dispatchEvent(new Event('storage'));
      };

      const handleSend = async () => {
        if (!inputText.trim() || !profile) return;

        const messageData = {
          id: 'msg_' + Date.now() + Math.random().toString(36).substr(2, 4),
          senderId: profile.id,
          senderName: profile.name,
          senderColor: profile.color,
          text: inputText.trim(),
          timestamp: Date.now(),
          readBy: [profile.id],
          reactions: {},
          replyTo: replyingTo ? replyingTo.id : null,
        };

        setInputText('');
        setReplyingTo(null);

        if (isCloudConnected && db) {
          try {
            const newMsgRef = db.doc(`artifacts/${appId}/channels/${channelId}/messages/${messageData.id}`);
            await newMsgRef.set(messageData);
            return;
          } catch (err) {
            console.error("Firebase send failed, saving locally...", err);
            setIsCloudConnected(false);
          }
        }
        saveMessageLocally(messageData);
      };

      const saveMessageLocally = (newMsg) => {
        const currentLocals = getLocalMessages();
        const updated = [...currentLocals, newMsg];
        localStorage.setItem(`local_messages_${appId}_ch_${channelId}`, JSON.stringify(updated));
        setMessages(updated);
        window.dispatchEvent(new Event('storage'));
      };

      const toggleReaction = async (msgId, emoji) => {
        if (!profile) return;
        const msg = messages.find(m => m.id === msgId);
        if (!msg) return;

        const currentReactions = msg.reactions?.[emoji] || [];
        const hasReacted = currentReactions.includes(profile.id);

        let newReactions = hasReacted 
          ? currentReactions.filter(id => id !== profile.id)
          : [...currentReactions, profile.id];

        if (isCloudConnected && db) {
          try {
            const msgRef = db.doc(`artifacts/${appId}/channels/${channelId}/messages/${msgId}`);
            if (newReactions.length === 0) {
              await msgRef.update({ [`reactions.${emoji}`]: firebase.firestore.FieldValue.delete() });
            } else {
              await msgRef.update({ [`reactions.${emoji}`]: newReactions });
            }
            setReactionMenu(null);
            return;
          } catch (e) {
            console.warn("Firebase reaction update failed, switching to local store...", e);
            setIsCloudConnected(false);
          }
        }

        const localMsgs = getLocalMessages();
        const updated = localMsgs.map(m => {
          if (m.id === msgId) {
            const copyReactions = { ...m.reactions };
            if (newReactions.length === 0) {
              delete copyReactions[emoji];
            } else {
              copyReactions[emoji] = newReactions;
            }
            return { ...m, reactions: copyReactions };
          }
          return m;
        });
        localStorage.setItem(`local_messages_${appId}_ch_${channelId}`, JSON.stringify(updated));
        setMessages(updated);
        setReactionMenu(null);
        window.dispatchEvent(new Event('storage'));
      };

      if (isLoading) {
        return (
          <div className="flex flex-col items-center justify-center h-screen bg-[#E5E9F0]">
            <div className="tactile-pill-btn w-16 h-16 animate-spin flex items-center justify-center" style={{ padding: 0 }}>
              <Icons.Home />
            </div>
            <p className="mt-4 font-black text-xs text-[#475569] tracking-widest animate-pulse">실시간 동기화 회로 정렬 중...</p>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-screen bg-[#E5E9F0] text-[#2C3E50] font-sans relative overflow-hidden">
          
          {/* 1. 온보딩 / 가입 화면 */}
          {(!isJoined || !profile) && (
            <div className="h-screen flex items-center justify-center p-6 z-10 overflow-y-auto">
              
              {/* 채널 번호 및 상태 램프 */}
              <div className="absolute top-4 right-4 flex items-center gap-3">
                <form onSubmit={handleChannelChange} className="debossed-well px-2.5 py-1 flex items-center gap-1.5 text-xs font-bold">
                  <span className="text-[#64748B] text-[10px]">채널번호:</span>
                  <input 
                    type="text" 
                    value={tempChannelId}
                    onChange={(e) => setTempChannelId(e.target.value)}
                    className="w-12 bg-transparent text-[#1E293B] outline-none text-center font-black"
                  />
                  <button type="submit" className="text-[10px] text-[#2563EB] font-black hover:underline">이동</button>
                </form>
                
                <div className="flex items-center gap-2 px-3.5 py-2.5 rounded-full bg-[#E2E8F0] border border-white/60 shadow-[inset_1px_1px_3px_rgba(0,0,0,0.08),_2px_2px_4px_rgba(255,255,255,0.8)] text-[10px] font-black tracking-wide uppercase">
                  {isCloudConnected ? (
                    <>
                      <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_4px_rgba(16,185,129,0.6)] animate-pulse"></span>
                      <span className="text-[#475569]">CH {channelId} Cloud Active</span>
                    </>
                  ) : (
                    <>
                      <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
                      <span className="text-[#475569]">CH {channelId} Local Storage Mode</span>
                    </>
                  )}
                </div>
              </div>

              {/* 메인 3D 가공 플레이트 */}
              <div className="tactile-plate p-8 w-full max-w-md border border-white/40 text-center relative z-10 shadow-2xl">
                
                <div className="relative w-32 h-24 mx-auto mb-5 flex items-center justify-center">
                  <div className="tactile-pill-btn w-24 h-16 flex items-center justify-center pointer-events-none" style={{ padding: 0 }}>
                    <Icons.Home />
                  </div>
                </div>

                <h1 className="text-3xl font-black tracking-tight text-[#1E293B] mb-2">
                  빠바밤
                </h1>
                <p className="text-xs text-[#64748B] mb-8 leading-relaxed max-w-xs mx-auto font-medium">
                  이제 나만의 서버에 데이터가 저장됩니다! 오른쪽 상단의 채널 번호(예: 101)를 일치시켜 두 대의 폰에서 동시에 시작해 보세요.
                </p>

                {/* 수납형 탭 플레이트 */}
                <div className="debossed-well p-1.5 flex gap-2 mb-8">
                  <button 
                    type="button"
                    onClick={() => setLoginMode('select')}
                    className={`flex-1 py-2.5 text-xs font-black rounded-full transition-all duration-150 ${loginMode === 'select' ? 'tactile-pill-btn text-[#1E293B]' : 'text-[#64748B] hover:text-[#1E293B]'}`}
                    style={loginMode === 'select' ? { padding: '10px 0' } : {}}
                  >
                    멤버 선택
                  </button>
                  <button 
                    type="button"
                    onClick={() => setLoginMode('create')}
                    className={`flex-1 py-2.5 text-xs font-black rounded-full transition-all duration-150 ${loginMode === 'create' ? 'tactile-pill-btn text-[#1E293B]' : 'text-[#64748B] hover:text-[#1E293B]'}`}
                    style={loginMode === 'create' ? { padding: '10px 0' } : {}}
                  >
                    멤버 추가
                  </button>
                </div>

                {/* TAB: 기존 계정 선택 */}
                {loginMode === 'select' && (
                  <div className="flex flex-col text-left">
                    <h2 className="text-[10px] font-black text-[#64748B] uppercase tracking-wider mb-3 px-1 flex items-center gap-1.5">
                      <Icons.Users /> CH {channelId} 에 접속한 멤버 목록
                    </h2>
                    {allProfiles.length === 0 ? (
                      <div className="debossed-well text-center py-10 px-4 text-xs text-[#64748B] leading-relaxed font-bold">
                        채널 {channelId}에 개설된 멤버가 아직 없습니다.<br/>
                        <span className="text-[#2563EB] cursor-pointer hover:underline mt-2 inline-block font-black" onClick={() => setLoginMode('create')}>새 멤버 만들고 첫 대화 시작하기</span>
                      </div>
                    ) : (
                      <div className="max-h-56 overflow-y-auto p-1 flex flex-col gap-3">
                        {allProfiles.map((p, idx) => (
                          <button
                            key={p.id || idx}
                            onClick={() => handleSelectProfile(idx)}
                            className="tactile-pill-btn w-full flex items-center justify-between group"
                            style={{ padding: '12px 18px' }}
                          >
                            <div className="flex items-center gap-3">
                              <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs border shadow-[inset_1px_1px_2px_rgba(255,255,255,0.8)] ${p.color?.split(' ')[0]}`}>
                                {p.name?.charAt(0)}
                              </div>
                              <span className="font-extrabold text-[#1E293B] text-sm">{p.name}</span>
                            </div>
                            <Icons.ArrowRight />
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* TAB: 새 계정 등록 */}
                {loginMode === 'create' && (
                  <form onSubmit={handleCreateProfile} className="flex flex-col gap-6 text-left">
                    <div className="debossed-well p-1.5">
                      <input 
                        type="text" 
                        value={joinName}
                        onChange={(e) => setJoinName(e.target.value)}
                        placeholder="활동할 고유 대화명을 입력하세요 (최대 10자)..."
                        maxLength={10}
                        className="w-full bg-transparent text-[#1E293B] px-4 py-3 outline-none placeholder:text-[#94A3B8] text-sm font-extrabold"
                        required
                      />
                    </div>
                    <div className="px-1">
                      <button 
                        type="submit"
                        disabled={!joinName.trim()}
                        className="tactile-pill-btn-primary w-full py-4 text-xs uppercase tracking-wider"
                      >
                        새 멤버 가입 및 입장
                      </button>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}

          {/* 2. 대화방 메인 화면 (PC / 모바일 반응형 분할 레이아웃 적용) */}
          {isJoined && profile && (
            <div className="flex-1 flex flex-col md:flex-row gap-4 h-full max-w-7xl mx-auto w-full z-10 overflow-hidden md:p-6 md:pb-6">
              
              {/* PC(태블릿) 전용 좌측 사이드바 제어판 */}
              <aside className="hidden md:flex w-80 flex-col gap-6 h-full shrink-0">
                {/* 브랜딩 및 채널 정보 카드 */}
                <div className="tactile-plate p-6 flex flex-col gap-5 border border-white/60">
                  <div className="flex items-center gap-3">
                    <div className="tactile-pill-btn w-12 h-12 flex items-center justify-center pointer-events-none" style={{ padding: 0 }}>
                      <Icons.Home />
                    </div>
                    <div>
                      <h1 className="text-xl font-black tracking-tight text-[#1E293B]">빠바밤</h1>
                      <p className="text-[10px] text-[#64748B] font-extrabold mt-1">실시간 동기화 메신저</p>
                    </div>
                  </div>
                  <div className="debossed-well p-3 flex flex-col gap-2">
                    <div className="flex items-center justify-between text-xs font-black text-[#475569]">
                      <span>현재 연결 채널</span>
                      <span className="text-[#2563EB]">CH {channelId}</span>
                    </div>
                    <div className="flex items-center gap-1.5 text-[10px] font-black uppercase">
                      {isCloudConnected ? (
                        <><span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Cloud Active</>
                      ) : (
                        <><span className="w-2 h-2 rounded-full bg-amber-400"></span> Offline Mode</>
                      )}
                    </div>
                  </div>
                </div>

                {/* 내 프로필 제어 카드 (알림 및 계정 삭제) */}
                <div className="tactile-plate p-6 flex flex-col gap-5 border border-white/60">
                  <div className="flex items-center gap-3 mb-1">
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg border shadow-[inset_1px_1px_2px_rgba(255,255,255,0.8)] ${profile.color}`}>
                      {profile.name.charAt(0)}
                    </div>
                    <div className="flex flex-col">
                      <span className="text-sm font-black text-[#1E293B]">{profile.name}</span>
                      <span className="text-[10px] text-[#64748B] font-bold">내 프로필 설정</span>
                    </div>
                  </div>
                  
                  <div className="flex flex-col gap-2">
                    <div className="flex gap-2">
                      <button 
                        onClick={handleRequestNotification} 
                        className={`tactile-pill-btn flex-1 text-[10px] font-black py-2.5 px-0 ${notiPermission === 'granted' ? 'text-emerald-600 border-emerald-200' : 'text-amber-600 border-amber-200'}`}
                      >
                        {notiPermission === 'granted' ? <Icons.Bell /> : <Icons.BellOff />} 
                        <span className="ml-1.5">{notiPermission === 'granted' ? '알림 켜짐' : '알림 켜기'}</span>
                      </button>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={handleSwitchAccount} className="tactile-pill-btn flex-1 text-[10px] font-black py-2.5 px-0">
                        <Icons.LogOut /> <span className="ml-1.5">계정 변경</span>
                      </button>
                      <button onClick={() => setShowDeleteModal(true)} className="tactile-pill-btn flex-1 text-[10px] font-black py-2.5 px-0 !text-red-500 border-red-200/50 hover:bg-red-50">
                        <Icons.Trash2 /> <span className="ml-1.5">계정 삭제</span>
                      </button>
                    </div>
                  </div>
                </div>

                {/* 접속자 목록 카드 */}
                <div className="tactile-plate p-6 flex-1 overflow-hidden flex flex-col border border-white/60">
                  <h2 className="text-xs font-black text-[#64748B] uppercase tracking-wider mb-4 flex items-center gap-1.5">
                    <Icons.Users /> 대기실 참여자 ({allProfiles.length})
                  </h2>
                  <div className="flex-1 overflow-y-auto pr-1 flex flex-col gap-2.5">
                    {allProfiles.map((p) => (
                      <div key={p.id} className="debossed-well p-3 flex items-center gap-3">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs border shadow-sm ${p.color?.split(' ')[0]}`}>
                          {p.name?.charAt(0)}
                        </div>
                        <span className="font-extrabold text-[#1E293B] text-xs truncate">{p.name}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </aside>

              {/* 메인 채팅 스크린 (모바일 겸용 우측 패널) */}
              <div className="flex-1 flex flex-col h-full w-full overflow-hidden relative md:tactile-plate md:p-3 md:border-white/60 md:shadow-2xl bg-[#E5E9F0] md:bg-transparent">
                
                {/* 모바일용 HEADER: 상단 베젤 (PC에선 숨김) */}
                <header className="md:hidden mx-4 mt-4 px-5 py-4 bg-[#EEF2F6] rounded-[24px] border border-white/80 flex items-center justify-between sticky top-4 z-30 shadow-[4px_6px_16px_rgba(163,177,198,0.45),_-4px_-4px_16px_rgba(255,255,255,0.7)]">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm border shadow-[inset_1px_1px_2px_rgba(255,255,255,0.8)] ${profile.color}`}>
                      {profile.name.charAt(0)}
                    </div>
                    <div>
                      <h1 className="text-base font-black tracking-tight text-[#1E293B] flex items-center gap-1.5">
                        빠바밤
                      </h1>
                      <p className="text-[10px] text-[#475569] font-extrabold flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_2px_rgba(16,185,129,0.6)] animate-pulse"></span>
                        CH {channelId} • {allProfiles.length}명
                      </p>
                    </div>
                  </div>

                  <div className="flex items-center gap-1.5">
                    <button 
                      onClick={handleRequestNotification}
                      className={`tactile-pill-btn p-2.5 ${notiPermission === 'granted' ? 'text-emerald-500' : 'text-amber-500'}`}
                    >
                      {notiPermission === 'granted' ? <Icons.Bell /> : <Icons.BellOff />}
                    </button>
                    <button 
                      onClick={handleSwitchAccount}
                      className="tactile-pill-btn p-2.5"
                    >
                      <Icons.LogOut />
                    </button>
                    <button 
                      onClick={() => setShowDeleteModal(true)}
                      className="tactile-pill-btn p-2.5 text-red-500 border-red-200/50"
                    >
                      <Icons.Trash2 />
                    </button>
                  </div>
                </header>

                {/* CHAT BOARD: 완결된 수납 플레이트 */}
                <main className="flex-1 overflow-y-auto px-4 py-4 relative md:debossed-well md:m-2 md:rounded-[20px] md:bg-[#EAF0F6]">
                  <div className="max-w-xl mx-auto flex flex-col gap-4.5 pb-6">
                    
                    {messages.length === 0 && (
                      <div className="debossed-well md:shadow-none md:border-dashed md:bg-white/30 text-center text-[#64748B] mt-10 text-xs p-8 leading-relaxed font-bold">
                        작성된 대화 기록이 전혀 없습니다.<br />
                        이 창을 다른 스마트폰이나 브라우저 시크릿 탭에서 새로 열어 다른 멤버로 로그인한 뒤,<br/>
                        서로 완벽하게 1:1로 비쳐 보이는 실시간 타이핑을 즐겨보세요!
                      </div>
                    )}

                    {messages.map((msg) => {
                      const isMe = msg.senderId === profile.id;
                      const replyMsg = msg.replyTo ? messages.find(m => m.id === msg.replyTo) : null;
                      const unreadCount = Math.max(0, allProfiles.length - (msg.readBy ? msg.readBy.length : 1));

                      return (
                        <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} my-1`}>
                          
                          {!isMe && (
                            <span className="text-[10px] font-extrabold text-[#64748B] mb-0.5 ml-1.5">
                              {msg.senderName}
                            </span>
                          )}

                          <div className={`flex items-end gap-2.5 max-w-[85%] ${isMe ? 'flex-row-reverse' : 'flex-row'}`}>
                            
                            {/* Message Bubble Plate */}
                            <div className="relative group">
                              <div className={`
                                flex flex-col p-4 chewy-bounce-mild
                                ${isMe 
                                  ? 'embossed-unit-blue text-white' 
                                  : 'embossed-unit-gray text-[#1E293B]'}
                              `}>
                                
                                {/* Replies Area inside bubbles */}
                                {replyMsg && (
                                  <div className={`mb-2 px-2.5 py-1.5 rounded-xl text-[11px] border-l-2 ${isMe ? 'bg-white/10 border-white/40 text-white/90' : 'bg-black/5 border-[#2563EB]/40 text-[#475569]'}`}>
                                    <span className="font-bold text-[9px] block mb-0.5 opacity-80">
                                      {replyMsg.senderName}에게 답장
                                    </span>
                                    <p className="truncate">{replyMsg.text}</p>
                                  </div>
                                )}

                                <p className="whitespace-pre-wrap leading-relaxed text-xs sm:text-[13px] font-semibold">{msg.text}</p>

                                {/* Reactions Tags */}
                                {msg.reactions && Object.keys(msg.reactions).length > 0 && (
                                  <div className="flex flex-wrap gap-1.5 mt-2.5">
                                    {Object.entries(msg.reactions).map(([emoji, users]) => (
                                      <button 
                                        key={emoji}
                                        onClick={() => toggleReaction(msg.id, emoji)}
                                        className="tactile-pill-btn px-2.5 py-1 border text-[10px]"
                                        style={{ padding: '4px 10px', outline: 'none' }}
                                      >
                                        {emoji} {users.length}
                                      </button>
                                    ))}
                                  </div>
                                )}
                              </div>

                              {/* Hover Action Triggers */}
                              <div className={`absolute top-1/2 -translate-y-1/2 flex gap-2.5 transition-opacity duration-150 opacity-0 group-hover:opacity-100 z-20 ${isMe ? 'right-full mr-3.5' : 'left-full ml-3.5'}`}>
                                <button 
                                  onClick={() => setReplyingTo(msg)} 
                                  className="tactile-pill-btn shadow-md"
                                  style={{ padding: '8px' }}
                                >
                                  <Icons.Reply />
                                </button>
                                <button 
                                  onClick={() => setReactionMenu(reactionMenu === msg.id ? null : msg.id)} 
                                  className="tactile-pill-btn shadow-md"
                                  style={{ padding: '8px' }}
                                >
                                  <Icons.Smile />
                                </button>
                              </div>

                              {/* Reaction Drawer Container */}
                              {reactionMenu === msg.id && (
                                <div className="tactile-card absolute top-full mt-2.5 p-1.5 z-30 flex gap-2 rounded-full shadow-lg">
                                  {EMOJIS.map(e => (
                                    <button key={e} onClick={() => toggleReaction(msg.id, e)} className="text-base p-1.5 hover:bg-black/5 rounded-full transition-transform hover:scale-125">
                                      {e}
                                    </button>
                                  ))}
                                </div>
                              )}
                            </div>

                            {/* Read Info and Timestamp */}
                            <div className={`flex flex-col text-[8.5px] text-[#64748B] ${isMe ? 'items-end' : 'items-start'} mb-0.5`}>
                              <button 
                                onClick={() => setReadInfoModal(msg)}
                                className="font-extrabold text-[#2563EB] hover:text-[#1D4ED8] transition-colors hover:underline mb-0.5 whitespace-nowrap"
                              >
                                {unreadCount === 0 ? '모두 읽음' : `읽음 ${msg.readBy ? msg.readBy.length : 1}명`}
                              </button>
                              <span>{formatTime(msg.timestamp)}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}

                    {/* 실시간 타이핑 추적 인디케이터 (다른 기기와 완전 연계) */}
                    <div className="flex flex-col gap-2.5 mt-4">
                      {allProfiles.filter(u => u.id !== profile.id && u.typingText && u.typingText.trim().length > 0).map(u => (
                        <div key={u.id} className="flex flex-col items-start gap-1 opacity-95">
                          <div className="flex items-center gap-1.5 ml-1.5">
                            <div className="flex gap-0.5 mr-0.5">
                              <span className="w-1.5 h-1.5 bg-[#2563EB] rounded-full animate-bounce"></span>
                              <span className="w-1.5 h-1.5 bg-[#2563EB] rounded-full animate-bounce delay-75"></span>
                              <span className="w-1.5 h-1.5 bg-[#2563EB] rounded-full animate-bounce delay-150"></span>
                            </div>
                            <span className={`text-[9px] font-black px-2 py-0.5 rounded-full border border-white/60 shadow-sm ${u.color}`}>
                              {u.name} 입력 중
                            </span>
                          </div>
                          <div className="debossed-well text-[#475569] px-4.5 py-2.5 text-xs break-all max-w-[80%] italic font-bold">
                            "{u.typingText}"
                          </div>
                        </div>
                      ))}
                    </div>
                    
                    <div ref={messagesEndRef} className="h-2" />
                  </div>
                </main>

                {/* CHAT INPUT PANEL */}
                <footer className="p-4 bg-gradient-to-t from-[#E5E9F0] md:from-transparent via-[#E5E9F0]/95 md:via-transparent to-transparent sticky bottom-0 z-20 md:p-2">
                  <div className="max-w-xl mx-auto">
                    
                    {/* Active Reply panel */}
                    {replyingTo && (
                      <div className="mb-0 mx-1 flex items-center justify-between bg-[#EEF2F6] text-[#1E293B] px-4 py-2.5 rounded-t-2xl border-t border-x border-white/80 shadow-md animate-in slide-in-from-bottom-2">
                        <div className="flex flex-col truncate border-l-2 border-[#2563EB] pl-2">
                          <span className="text-[9px] font-black text-[#2563EB]">{replyingTo.senderName}에게 답장</span>
                          <span className="text-xs truncate text-[#64748B]">{replyingTo.text}</span>
                        </div>
                        <button onClick={() => setReplyingTo(null)} className="tactile-pill-btn p-1.5" style={{ padding: '6px' }}>
                          <Icons.X />
                        </button>
                      </div>
                    )}

                    {/* Chat Input form with debossed physical border */}
                    <div className={`debossed-well flex items-end p-2 md:bg-[#EAF0F6] ${replyingTo ? 'rounded-tl-none border-t-transparent' : ''}`}>
                      <textarea
                        className="flex-1 bg-transparent border-none outline-none resize-none max-h-24 p-3.5 text-xs sm:text-sm text-[#1E293B] placeholder:text-[#94A3B8] font-semibold"
                        placeholder="내가 한 글자씩 타이핑하는 모습을 친구들이 실시간으로 지켜보고 있습니다..."
                        rows={1}
                        value={inputText}
                        onChange={(e) => setInputText(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            handleSend();
                          }
                        }}
                        style={{ minHeight: '44px' }}
                      />
                      <div className="px-1 py-0.5 flex-shrink-0">
                        <button 
                          onClick={handleSend}
                          disabled={!inputText.trim()}
                          className="tactile-pill-btn-primary w-12 h-12 flex items-center justify-center shadow-lg animate-in fade-in"
                          style={{ padding: 0 }}
                        >
                          <Icons.Send />
                        </button>
                      </div>
                    </div>
                  </div>
                </footer>

              </div>
            </div>
          )}

          {/* DETAILED READ RECEIPTS MODAL */}
          {readInfoModal && (
            <div className="fixed inset-0 bg-black/25 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-150">
              <div className="tactile-card w-full max-w-xs p-6 flex flex-col border border-white/60 shadow-2xl relative z-50">
                <div className="flex justify-between items-center mb-5">
                  <h3 className="text-sm font-black text-[#1E293B] flex items-center gap-1.5">
                    <Icons.Eye /> <span className="text-sm">수신 확인 리스트</span>
                  </h3>
                  <button onClick={() => setReadInfoModal(null)} className="tactile-pill-btn" style={{ padding: '6px' }}>
                    <Icons.X />
                  </button>
                </div>
                
                {(() => {
                  const readUsers = allProfiles.filter(u => readInfoModal.readBy?.includes(u.id));
                  const unreadUsers = allProfiles.filter(u => !readInfoModal.readBy?.includes(u.id));

                  return (
                    <div className="flex flex-col gap-4 max-h-60 overflow-y-auto pr-1">
                      {unreadUsers.length > 0 && (
                        <div className="debossed-well p-3.5">
                          <h4 className="text-[10px] font-black text-red-500 tracking-wider uppercase mb-2">아직 안 읽음 ({unreadUsers.length})</h4>
                          <div className="flex flex-wrap gap-1.5">
                            {unreadUsers.map(u => (
                              <span key={u.id} className="text-[10px] px-2.5 py-1 rounded-md bg-red-100 text-red-700 border border-red-200 font-bold">
                                {u.name}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}

                      <div className="debossed-well p-3.5">
                        <h4 className="text-[10px] font-black text-[#2563EB] tracking-wider uppercase mb-2">읽음 확인 완료 ({readUsers.length})</h4>
                        <div className="flex flex-wrap gap-1.5">
                          {readUsers.map(u => (
                            <span key={u.id} className={`text-[10px] px-2.5 py-1 rounded-md border font-extrabold ${u.color}`}>
                              {u.name}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })()}
                
                <div className="pt-4 flex justify-center">
                  <button 
                    onClick={() => setReadInfoModal(null)}
                    className="tactile-pill-btn w-full"
                    style={{ padding: '12px 0' }}
                  >
                    닫기
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* DELETE ACCOUNT CONFIRMATION MODAL */}
          {showDeleteModal && (
            <div className="fixed inset-0 bg-black/25 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-150">
              <div className="tactile-card w-full max-w-xs p-6 flex flex-col border border-white/60 shadow-2xl relative z-50 text-center">
                <div className="w-14 h-14 mx-auto mb-4 flex items-center justify-center rounded-full bg-red-100 text-red-500 shadow-inner border border-red-200">
                  <Icons.Trash2 />
                </div>
                <h3 className="text-lg font-black text-[#1E293B] mb-2">계정 영구 삭제</h3>
                <p className="text-xs font-bold text-[#64748B] leading-relaxed mb-6">
                  정말 현재 접속 중인 계정을 삭제하시겠습니까?<br/>이 작업은 되돌릴 수 없으며 대기실에서도 완전히 사라집니다.
                </p>
                <div className="flex gap-3">
                  <button onClick={() => setShowDeleteModal(false)} className="tactile-pill-btn flex-1 py-3 text-xs">취소</button>
                  <button onClick={handleDeleteAccount} className="tactile-pill-btn flex-1 py-3 text-xs !text-red-500 font-black border-red-200 hover:bg-red-50">삭제하기</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
